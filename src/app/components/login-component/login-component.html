<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4" style="width: 450px; border-radius:15px;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Bank Management System</h2>
            <p class="text-muted mb-0">Login to your account</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="loginUser()">

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>

                <input type="text" class="form-control" formControlName="userName" placeholder="Enter Username">

                <div *ngIf="loginForm.get('userName')?.invalid && (loginForm.get('userName')?.touched || loginForm.get('userName')?.dirty)">
                    <small class="text-danger" *ngIf="loginForm.get('userName')?.hasError('required')"> Username is required </small>
                </div>
            </div>


            <div class="mb-3">

                <label class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="Enter Password">

                <div *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.touched || loginForm.get('password')?.dirty)">
                    <small class="text-danger" *ngIf="loginForm.get('password')?.hasError('required')"> Password is required </small>
                </div>
            </div>

            <div *ngIf="loginError" class="alert alert-danger">
                {{loginError}}
            </div>
            <button type="submit"  class="btn btn-primary w-100" [disabled]="loginForm.invalid">
   Login
 </button>

        </form>

    </div>

</div>
